<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Penut Operator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">P</div>
          <div>
            <strong>Penut Operator</strong>
            <span>Local browser agent</span>
          </div>
        </div>
        <nav>
          <button class="nav-item active">Approvals</button>
          <button class="nav-item" disabled>Runs</button>
          <button class="nav-item" disabled>Settings</button>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Task ready</p>
            <h1>Review and run</h1>
          </div>
          <span id="statusBadge" class="badge">Loading</span>
        </header>

        <section class="grid">
          <article class="panel">
            <div class="section-title">
              <h2>Task</h2>
              <p>Edit the request, then approve it to let the agent get to work.</p>
            </div>

            <label class="field">
              <span>What should happen?</span>
              <textarea id="taskPrompt" rows="5"></textarea>
            </label>

            <div class="actions">
              <button id="resetBtn" class="secondary">Reset</button>
              <button id="approveBtn" class="primary">Approve</button>
              <button id="stopBtn" class="danger">Stop</button>
            </div>
          </article>

          <aside class="panel">
            <div class="section-title">
              <h2>Activity</h2>
              <p>A simple history of what the agent did and how far it got.</p>
            </div>
            <ol id="eventList" class="events"></ol>
          </aside>
        </section>
      </section>
    </main>

    <script src="./renderer.js" type="module"></script>
  </body>
</html>
